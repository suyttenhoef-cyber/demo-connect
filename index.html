/* ============================================================
   Vanden Broele Connect — Démo · feuille de styles (moteur)
   Charte COMMUNE à toutes les collections.
   ============================================================ */
/* ============================================================
   Vanden Broele Connect — Démo (MVP fidèle, single-file)
   ------------------------------------------------------------
   Plateforme COMMUNE : pas de charte par collection.
   La personnalisation client (TENANT) ne touche QUE :
   nom de la commune · collection accessible · offre commerciale.
   ============================================================ */
:root{
  --ink:#15222e;          /* titres / texte nav */
  --navy:#113e67;         /* bleu foncé institutionnel */
  --blue:#1c5fa0;         /* liens / boutons */
  --blue-dark:#174e85;
  --pill:#e9f1fb;         /* fond onglet/nav actif */
  --assist1:#6d3bf0;      /* bouton Assist (IA) */
  --assist2:#7c3aed;
  --band:#f2f5f9;         /* bandeaux gris clair */
  --bg:#ffffff;
  --soft:#f6f8fb;
  --border:#e4e8ef;
  --muted:#5f6b78;
  --lock:#b4862a;
  --lock-soft:#fbf3e0;
  --maxw:1180px;
  --radius:10px;
  --shadow:0 1px 2px rgba(16,32,48,.04),0 10px 30px rgba(16,32,48,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Source Sans Pro','Source Sans 3',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font-family:inherit;cursor:pointer;border:none;background:none}
h1,h2,h3,h4,h5{font-family:'Source Sans Pro','Source Sans 3',system-ui,sans-serif;line-height:1.25;color:var(--navy);font-weight:600;letter-spacing:-.01em}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
.link-blue{color:var(--blue);font-weight:600}
.link-blue:hover{color:var(--blue-dark);text-decoration:underline}

/* ---------- header ---------- */
header.main{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
header.main .wrap{display:flex;align-items:center;gap:18px;height:78px}
.logo{display:flex;align-items:center;gap:11px;flex-shrink:0}
.cube{height:54px;width:auto;max-width:220px;flex-shrink:0;object-fit:contain}
.logo .lt{font-size:12px;color:#7c8896;font-weight:500;line-height:1}
.logo .lb{font-size:21px;color:var(--navy);font-weight:700;line-height:1.05;letter-spacing:-.01em}
.demo-pill{background:#0e9594;color:#fff;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:5px;margin-left:4px;align-self:center}
nav.top{display:flex;align-items:center;gap:3px;margin-left:8px}
nav.top a{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:500;color:#3a4654;padding:9px 13px;border-radius:8px;transition:.12s}
nav.top a:hover{background:var(--soft)}
nav.top a.active{background:var(--pill);color:var(--navy);font-weight:600}
nav.top a svg{opacity:.8}
.head-right{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0}
.assist-btn{background:linear-gradient(120deg,var(--assist1),var(--assist2));color:#fff;font-weight:600;font-size:14px;padding:10px 18px;border-radius:9px;display:flex;align-items:center;gap:8px;box-shadow:0 6px 16px rgba(109,59,240,.3)}
.assist-btn:hover{filter:brightness(1.07)}
.head-icon{color:#5f6b78;display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px}
.head-icon:hover{background:var(--soft)}
.lang{font-size:13.5px;font-weight:600;color:#3a4654}
.contenu-wrap{position:relative}
.dropdown{position:absolute;top:48px;left:0;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:10px;min-width:248px;z-index:60}
.dropdown a{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:8px;font-size:14px;color:var(--blue);font-weight:500}
.dropdown a:hover{background:var(--soft)}
.dropdown a svg{color:var(--blue);opacity:.85}

/* page title band */
.band{background:var(--band);border-bottom:1px solid var(--border)}
.band .wrap{padding-top:26px;padding-bottom:26px}
.band h1{font-size:27px}

/* ---------- search row (Chercher / Accueil) — Connect style ---------- */
.c-search-band{background:#edf1f6;padding:18px 0;border-bottom:1px solid #d5dfe9}
.c-search-wrap{display:flex;align-items:stretch;gap:0}
.c-search-inner{flex:1;display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid #c8d4df;border-right:none;border-radius:8px 0 0 8px;padding:0 16px}
.c-search-inner:focus-within{border-color:var(--blue)}
.c-search-icon{color:#7c8896;flex-shrink:0;display:flex;align-items:center}
.c-search-field{flex:1;border:none;outline:none;font-size:15px;padding:13px 0;color:var(--ink);background:none}
.c-search-btn{background:#1a2d45;color:#fff;font-weight:600;font-size:14px;padding:0 28px;border-radius:0 8px 8px 0;white-space:nowrap;border:none;cursor:pointer}
.c-search-btn:hover{background:#243d5d}
.filters{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.filter-btn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13.5px;color:#3a4654;font-weight:500;display:flex;align-items:center;gap:8px}
.filter-btn:hover{border-color:var(--blue)}
.filter-btn.active{border-color:var(--blue);color:var(--blue);background:var(--pill)}

main{min-height:54vh;padding-bottom:60px}
.pad{padding-top:30px}

/* tabs (home) */
.tabs{display:flex;gap:26px;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{font-size:14.5px;font-weight:500;color:var(--muted);padding:12px 2px;border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;gap:8px}
.tab.active{color:var(--navy);border-color:var(--blue);font-weight:600}
.tab .count{background:var(--navy);color:#fff;font-size:11px;font-weight:700;border-radius:999px;padding:1px 8px}

/* home layout */
.home-grid{display:grid;grid-template-columns:1fr 330px;gap:36px}
/* updates tab still uses feed-item */
.feed-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border)}
.feed-item:last-child{border:none}
.feed-body .ftype{font-size:12px;color:var(--muted);margin:2px 0 4px;display:flex;gap:8px;align-items:center}
.tagcat{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 7px;border-radius:4px;color:#fff}
.feed-body h3{font-size:16px;margin-bottom:5px}
.feed-body h3 a:hover{color:var(--blue);text-decoration:underline}
.feed-body .fmeta{font-size:12.5px;color:var(--muted);margin-bottom:6px}
.feed-body p{font-size:14px;color:#43505d}
/* Connect-style article teasers */
.c-teaser{display:flex;gap:18px;padding:18px 0;border-bottom:1px solid var(--border)}
.c-teaser:last-child{border:none}
.c-teaser__side{flex-shrink:0}
.c-teaser__cover{display:block;cursor:pointer;border-radius:7px;overflow:hidden;line-height:0}
.c-teaser__cover img{display:block;object-fit:cover;width:140px;height:90px;border-radius:7px;transition:opacity .15s}
.c-teaser__cover:hover img{opacity:.88}
.c-teaser__main{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.c-teaser__title{font-size:17px;font-weight:700;margin:0 0 5px;line-height:1.35}
.c-teaser__title a{color:#1a2d45;text-decoration:none}
.c-teaser__title a:hover{color:var(--blue);text-decoration:underline}
.c-teaser__meta{font-size:12.5px;color:var(--muted);margin-bottom:7px}
.c-teaser__body{font-size:14px;color:#43505d;line-height:1.5}

/* side cards */
.scard{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:18px}
.scard .sh{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.scard .sh .si{width:30px;height:30px;border-radius:8px;background:var(--pill);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.scard .sh h4{font-size:15px}
.scard .sh .more{margin-left:auto;font-size:12.5px;color:var(--blue);font-weight:600}
.el-item{display:flex;gap:12px;align-items:center}
.el-item .elt{width:46px;height:46px;border-radius:8px;background:linear-gradient(135deg,#1a5183,#0e9594);flex-shrink:0}
.el-item a{font-size:14px;color:var(--blue);font-weight:600}
.el-item small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.fav{padding:9px 0;border-bottom:1px solid var(--border)}
.fav:last-of-type{border:none}
.fav a{font-size:14px;color:var(--blue);font-weight:600}
.fav a:hover{text-decoration:underline}
.fav small{display:block;color:var(--muted);font-size:12px}
.show-more{width:100%;background:var(--soft);border:1px solid var(--border);border-radius:8px;padding:9px;font-size:12.5px;font-weight:600;color:#3a4654;margin-top:12px;letter-spacing:.03em;text-transform:uppercase}
.empty-memo{font-size:13px;color:var(--muted);text-align:center;padding:14px 0}

/* breadcrumb */
.crumb{font-size:13.5px;color:var(--muted);margin-bottom:22px}
.crumb a{color:#3a4654;font-weight:500}
.crumb a:hover{color:var(--blue)}
.crumb .sep{margin:0 8px;color:#b9c2cd}

/* rubriques cards */
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.rcard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:22px 22px 18px;min-height:160px;display:flex;flex-direction:column}
.rcard h3{font-size:19px;margin-bottom:14px}
.rcard .contient{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#9aa6b2;font-weight:600;margin-bottom:3px}
.rcard .contient-v{font-size:13.5px;color:#43505d;margin-bottom:6px}
.rcard .ractions{margin-top:auto;display:flex;gap:10px;flex-wrap:wrap}
.r-explore,.r-deepen{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:500;color:var(--blue);border:1px solid var(--border);border-radius:7px;padding:8px 13px}
.r-explore:hover,.r-deepen:hover{border-color:var(--blue);background:var(--pill)}

/* generic content list */
.clist .citem{display:flex;gap:16px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px;cursor:pointer;transition:.13s}
.clist .citem:hover{box-shadow:var(--shadow);border-color:#cfd8e2}
.citem .cthumb{width:70px;height:70px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff}
.citem .cbody{flex:1}
.citem h3{font-size:17px;margin-bottom:5px}
.citem h3 a,.citem h3{color:var(--blue)}
.citem h3:hover{text-decoration:underline}
.citem .ctype{font-size:12.5px;color:#43505d;font-weight:600;margin-bottom:4px}
.citem .crub{font-size:12px;color:var(--muted)}
.citem .cmeta{font-size:12px;color:var(--muted);margin-top:6px}
.citem .cmeta b{color:#3a4654;font-weight:600}
.cside{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0}
.badge-num{display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:12.5px;color:#3a4654;font-weight:600}
.badge-num svg{color:#0e9594}
.badge-score{border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:12.5px;color:var(--muted);font-weight:600}

/* search 2-col */
.s-layout{display:grid;grid-template-columns:260px 1fr;gap:34px;padding-top:24px}
.s-side h4{font-size:14px;margin-bottom:12px;color:var(--navy)}
.tree{font-size:13.5px}
.tree .tnode{display:flex;align-items:center;gap:8px;padding:5px 0;color:#3a4654;cursor:pointer}
.tree .tnode:hover{color:var(--blue)}
.tree .tnode input{accent-color:var(--blue)}
.tree .tnode .tc{margin-left:auto;color:#9aa6b2;font-size:12px}
.tree .lvl1{padding-left:22px;color:#54616e}
.tree .lvl2{padding-left:42px;color:#6c7884;font-size:13px}
.s-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.s-head .rc{font-size:14px;color:#3a4654}
.s-head .sort{font-size:13px;color:var(--muted)}
.s-head .sort b{color:#3a4654}
mark{background:#fdf0c8;color:inherit;padding:0 2px;border-radius:3px}

/* book covers (bibliothèque) */
.bgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.book{cursor:pointer;transition:.14s}
.book:hover{transform:translateY(-3px)}
.cover{aspect-ratio:3/4;border-radius:6px;overflow:hidden;box-shadow:var(--shadow);background:#fff;display:flex;flex-direction:column;position:relative;border:1px solid var(--border)}
.cover .clic{font-size:9px;font-weight:800;letter-spacing:.05em;color:#fff;padding:7px 10px;text-transform:uppercase}
.cover .cmid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:14px;text-align:center}
.cover .cmid .ct{font-weight:700;font-size:15px;color:#1d2a36;line-height:1.2}
.cover .cmid .cic{font-size:30px;opacity:.8}
.cover .cbot{background:var(--navy);color:#fff;font-size:9px;font-weight:800;letter-spacing:.05em;text-align:center;padding:7px;text-transform:uppercase}
.book .blabel{font-size:12.5px;color:#43505d;margin-top:9px;font-weight:500}
.book .btype{font-size:11.5px;color:var(--muted)}
.book.locked .cover{filter:saturate(.5)}
.cover .lockcorner{position:absolute;top:8px;right:8px;background:var(--lock-soft);color:var(--lock);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center}

/* article */
.article{max-width:760px;margin:0 auto;padding-top:30px}
.article .atype{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue)}
.article h1{font-size:31px;margin:8px 0 14px}
.article .ameta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted);padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:26px}
.article .ameta .dot{width:3px;height:3px;border-radius:50%;background:#c4ccd6}
.tag{font-size:11.5px;background:var(--soft);border:1px solid var(--border);padding:3px 9px;border-radius:6px;color:#54616e}
.article .body p{font-size:16px;margin-bottom:17px;color:#2a3744}
.related{margin-top:40px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px}
.related h4{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:14px;display:flex;gap:8px;align-items:center}
.ri{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ri:last-child{border:none}
.ri:hover h5{color:var(--blue)}
.ri .rii{color:var(--blue);flex-shrink:0;margin-top:2px}
.ri h5{font-size:14.5px;color:var(--navy);font-weight:600}
.ri small{font-size:12px;color:var(--muted)}

/* offer */
.offer{background:linear-gradient(135deg,var(--navy),#1a5183);border-radius:14px;padding:34px 38px;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:28px;flex-wrap:wrap;margin-top:42px}
.offer h2{color:#fff;font-size:24px;margin-bottom:8px}
.offer p{color:#cfdcec;font-size:14.5px;max-width:480px}
.offer .price{color:#bfe3e2;font-size:12.5px;margin-top:10px}
.offer .oc{display:flex;gap:12px;flex-shrink:0}
.btn{padding:11px 20px;border-radius:9px;font-size:14px;font-weight:600;white-space:nowrap}
.btn-w{background:#fff;color:var(--navy)}
.btn-w:hover{background:#eaf1f8}
.btn-o{border:1.5px solid rgba(255,255,255,.45);color:#fff}

/* footer */
footer{background:var(--band);border-top:1px solid var(--border);padding:22px 0;font-size:12.5px;color:var(--muted)}
footer .wrap{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;text-align:center}

/* lock modal */
.modal-bg{position:fixed;inset:0;background:rgba(12,28,49,.55);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .18s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;max-width:560px;width:100%;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);position:relative;animation:rise .22s}
@keyframes rise{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal .mt{background:var(--lock-soft);padding:24px 28px;border-bottom:1px solid #f0e3c5}
.modal .mt .lp{display:inline-flex;align-items:center;gap:6px;background:var(--lock);color:#fff;font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:12px}
.modal .mt h3{font-size:21px}
.modal .mb{padding:24px 28px}
.modal .mb p{font-size:14px;color:var(--muted);margin-bottom:18px}
.bens{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:22px}
.ben{display:flex;gap:10px;align-items:center;font-size:13.5px;font-weight:500}
.ben .bi{width:34px;height:34px;border-radius:9px;background:var(--pill);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.macts{display:flex;gap:12px}.macts .btn{flex:1;text-align:center}
.btn-b{background:var(--blue);color:#fff}.btn-b:hover{background:var(--blue-dark)}
.btn-g{border:1.5px solid var(--border);color:#3a4654}
.mclose{position:absolute;top:14px;right:18px;font-size:26px;color:#9aa6b2;line-height:1;z-index:2}.mclose:hover{color:#3a4654}

/* Assist panel (IA) */
.assist-bg{position:fixed;inset:0;background:rgba(12,28,49,.4);z-index:180;animation:fade .15s}
.assist-panel{position:fixed;top:0;right:0;height:100%;width:430px;max-width:100%;background:#fff;z-index:190;box-shadow:-10px 0 40px rgba(0,0,0,.2);display:flex;flex-direction:column;animation:slide .25s}
@keyframes slide{from{transform:translateX(40px);opacity:.6}to{transform:translateX(0);opacity:1}}
.assist-head{background:linear-gradient(120deg,var(--assist1),var(--assist2));color:#fff;padding:20px 22px}
.assist-head .ah{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:700}
.assist-head p{font-size:12.5px;opacity:.9;margin-top:4px}
.assist-body{flex:1;overflow-y:auto;padding:20px 22px}
.assist-q{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.aq{display:block;width:100%;text-align:left;background:var(--soft);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-size:13.5px;color:#3a4654;margin-bottom:8px}
.aq:hover{border-color:var(--assist2);color:var(--assist2)}
.amsg{background:linear-gradient(135deg,#fff,#f4f0ff);border:1px solid #e6ddfb;border-radius:12px;padding:16px 18px;margin-top:8px}
.amsg .answer{font-size:14px;line-height:1.6;color:#2a3744}
.asrc{margin-top:14px;display:flex;flex-direction:column;gap:7px}
.asrc .s{display:flex;gap:8px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--blue);font-weight:500;cursor:pointer}
.asrc .s:hover{border-color:var(--assist2)}
.assist-foot{border-top:1px solid var(--border);padding:14px 18px;display:flex;gap:8px}
.assist-foot input{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;font-size:14px;outline:none}
.assist-foot input:focus{border-color:var(--assist2)}
.assist-foot button{background:linear-gradient(120deg,var(--assist1),var(--assist2));color:#fff;border-radius:9px;padding:0 16px;font-weight:600}
.thinking{display:flex;gap:5px;padding:6px 0}
.thinking span{width:7px;height:7px;border-radius:50%;background:var(--assist2);opacity:.4;animation:bounce 1.2s infinite}
.thinking span:nth-child(2){animation-delay:.2s}.thinking span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{opacity:.3;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

/* guided tour */
.tour{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;border-radius:14px;padding:18px 22px;max-width:440px;width:calc(100% - 40px);z-index:210;box-shadow:0 20px 50px rgba(0,0,0,.4);animation:rise .25s}
.tour .ts{font-size:11.5px;color:#bfe3e2;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.tour h4{color:#fff;font-size:16px;margin-bottom:6px}
.tour p{font-size:13.5px;color:#cfdcec;margin-bottom:14px}
.tour .ta{display:flex;justify-content:space-between;align-items:center}
.tour .ta .skip{font-size:12.5px;color:#9fb1c4}
.tour .ta .next{background:#0e9594;color:#fff;font-weight:600;padding:8px 18px;border-radius:8px;font-size:13px}

/* icon rail */
.icon-rail{width:72px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0 14px;position:sticky;top:78px;height:calc(100vh - 78px);flex-shrink:0;z-index:2}
.ir-logo{margin-bottom:20px;display:flex;align-items:center;justify-content:center;width:40px;height:40px}
.ir-logo svg,.ir-logo img{display:block;width:36px;height:36px}
.ir-main{display:flex;flex-direction:column;align-items:center;gap:30px;flex:1}
.ir-bottom{display:flex;flex-direction:column;align-items:center;gap:10px}
.ir-icon{-webkit-appearance:none;appearance:none;padding:0;border:0;background:0 0;display:flex;justify-content:center;align-items:center;cursor:pointer;color:#0a558c;width:40px;height:40px;border-radius:4px;-webkit-transition:background-color .2s ease;transition:background-color .2s ease}
.ir-icon:hover{background-color:#dbeafe}
.ir-icon.active{background-color:#7c3aed;color:#fff}
.ir-lang{font-size:10.5px;font-weight:700;letter-spacing:.04em;line-height:1}
/* ---- vue Livre ---- */
.livre-searchbar{display:flex;align-items:stretch;border-bottom:1px solid var(--border);padding:14px 32px;gap:0;background:#fff}
.livre-pill{background:#fff;border:1.5px solid var(--border);border-right:none;border-radius:6px 0 0 6px;padding:9px 14px;font-size:13.5px;font-weight:600;color:var(--navy);white-space:nowrap;display:flex;align-items:center}
.livre-sinput{flex:1;border:1.5px solid var(--border);border-right:none;border-radius:0;padding:9px 14px;font-size:14px;outline:none;font-family:inherit;min-width:0;color:var(--ink)}
.livre-sinput:focus{border-color:var(--blue);z-index:1;position:relative}
.livre-sbtn{background:var(--navy);color:#fff;border:none;border-radius:0 6px 6px 0;padding:9px 26px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.livre-sbtn:hover{background:var(--blue)}
.livre-body{max-width:960px;margin:0 auto;padding:28px 40px 60px}
.livre-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:10px}
.livre-h1{font-size:22px;font-weight:700;color:var(--navy);line-height:1.28;flex:1;margin:0}
.livre-meta{font-size:13px;color:var(--muted);margin-bottom:16px}
.livre-sep{border:none;border-top:1px solid var(--border);margin-bottom:22px}
.livre-intro{display:flex;gap:26px;margin-bottom:36px;align-items:flex-start}
.livre-cover{width:148px;min-width:148px;min-height:190px;border-radius:6px;padding:14px 12px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;color:#fff;box-shadow:0 4px 18px rgba(16,32,48,.22)}
.lc-lic{font-size:8.5px;font-weight:800;letter-spacing:.07em;opacity:.65;text-transform:uppercase;margin-bottom:8px}
.lc-icon{font-size:38px;flex:1;display:flex;align-items:center;justify-content:center}
.lc-cat{font-size:11px;opacity:.82;font-weight:500;line-height:1.3;margin-top:8px}
.livre-desc p{font-size:15px;color:#2a3744;line-height:1.75;margin-bottom:14px}
.livre-contenu{border-top:1px solid var(--border);padding-top:22px;margin-top:8px}
.livre-contenu-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.livre-contenu-hd h2{font-size:18px;font-weight:700;color:var(--navy);margin:0}
.btn-afficher{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}
.lc-group{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.lc-group-hd{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--soft);font-size:14px;font-weight:700;color:var(--navy);cursor:pointer;user-select:none}
.lc-toggle{font-size:18px;color:var(--blue);line-height:1;width:20px;text-align:center;flex-shrink:0}
.lc-item{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-top:1px solid var(--border);cursor:pointer;border-left:3px solid #f59e0b}
.lc-item:hover{background:#fffbf0}
.lc-item-title{color:var(--blue);font-size:13.5px;font-weight:500}
.lc-item:hover .lc-item-title{text-decoration:underline}
.lc-item-type{font-size:11.5px;color:var(--muted)}
@media(max-width:980px){
  nav.top span.lbl{display:none} nav.top a{padding:9px}
  .home-grid{grid-template-columns:1fr}
  .s-layout{grid-template-columns:1fr}.s-side{display:none}
  .rgrid{grid-template-columns:repeat(2,1fr)}.bgrid{grid-template-columns:repeat(3,1fr)}
}

/* Offre personnalisée : ?c=CODE_POSTAL&col=COLLECTION
   Le PDF est hébergé dans le dossier offres/ du repo GitHub Pages.
   URL construite : offres/{COL}-{CP}.pdf (relative, fonctionne en local et en prod) */
const OFFER_PARAMS=(()=>{
  try{
    const p=new URLSearchParams(window.location.search);
    const c=p.get('c');
    if(!c)return null;
    const col=(p.get('col')||'CPAS').toUpperCase();
    const commune=(typeof COMMUNES!=='undefined'?COMMUNES:[]).find(x=>x.cp===c);
    const fileName=col+'-'+c+'.pdf';
    const url='offres/'+fileName;
    return{cp:c,col,commune:commune||{cp:c,nom:c},url,fileName};
  }catch(e){return null;}
})();

const norm=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
const byId=id=>CONTENT.find(c=>c.id===id);
const rubName=id=>(RUBRIQUES.find(r=>r.id===id)||{}).name||"";
const tColor=t=>(TYPES[t]||{c:"#5f6b78"}).c;
const tIcon=t=>I[TYPE_ICONS[t]||"doc"];

/* ---- ACCUEIL ---- */
let HOME_TAB="alaune";
function viewHome(){
  const feat=CONTENT.filter(c=>c.featured);
  const recent=CONTENT.slice(0,5);
  let feed="";
  if(HOME_TAB==="alaune"){
    feed=feat.concat(CONTENT.filter(c=>!c.featured).slice(0,2)).map(feedItem).join("");
  }else if(HOME_TAB==="updates"){
    feed=UPDATES.map(u=>`<div class="feed-item"><div class="feed-body">
      <div class="ftype"><span class="tagcat" style="background:${tColor(u.type)}">${u.type}</span> ${u.date}</div>
      <h3><a onclick="openContent('${u.id}')">${byId(u.id).title}</a></h3>
      <p>${u.note}</p></div></div>`).join("");
  }else{
    feed=recent.slice(0,4).map(feedItem).join("");
  }
  return band("",`
  <div class="c-search-band"><div class="wrap">
    <div class="c-search-wrap">
      <div class="c-search-inner">
        <span class="c-search-icon">${I.search}</span>
        <input id="homeSearch" class="c-search-field" placeholder="Introduisez vos termes de recherche…" onkeydown="if(event.key==='Enter')runSearch(this.value)">
      </div>
      <button class="c-search-btn" onclick="runSearch(document.getElementById('homeSearch').value)">Chercher</button>
    </div>
  </div></div>
  <div class="wrap pad"><div class="home-grid">
    <div>
      <div class="tabs">
        <div class="tab ${HOME_TAB==='alaune'?'active':''}" onclick="setTab('alaune')">À la une</div>
        <div class="tab ${HOME_TAB==='updates'?'active':''}" onclick="setTab('updates')">Mises à jour récentes <span class="count">7</span></div>
        <div class="tab ${HOME_TAB==='recent'?'active':''}" onclick="setTab('recent')">Articles consultés récemment</div>
      </div>
      ${feed}
    </div>
    <aside>
      <div class="scard">
        <div class="sh"><span class="si">${I.cap}</span><h4>Formations</h4><a class="more" onclick="go('contenu/E-learning')">Tous les e-learnings →</a></div>
        <div class="el-item"><span class="elt"></span><div><a onclick="openLock()">${ELEARNING.title}</a><small>${ELEARNING.date}</small></div></div>
      </div>
      <div class="scard">
        <div class="sh"><span class="si">${I.star}</span><h4>Mes favoris</h4></div>
        ${CONTENT.filter(c=>c.fav).map(c=>`<div class="fav"><a onclick="openContent('${c.id}')">${c.title}</a><small>${c.type}</small></div>`).join("")}
        <button class="show-more">Afficher plus</button>
      </div>
      <div class="scard">
        <div class="sh"><span class="si">${I.memo}</span><h4>Mes mémos</h4></div>
        <div class="empty-memo">Vous n'avez pas encore de mémo.<br>Annotez un contenu pour le retrouver ici.</div>
      </div>
    </aside>
  </div>
  ${offer()}
  </div>`,true);
}
function feedItem(c){
  const seed=c.id.replace(/-/g,'');
  return `<article class="c-teaser">
    <div class="c-teaser__side">
      <a class="c-teaser__cover" onclick="openContent('${c.id}')">
        <img src="https://picsum.photos/seed/${seed}/280/180" alt="" width="140" height="90" loading="lazy">
      </a>
    </div>
    <div class="c-teaser__main">
      <h2 class="c-teaser__title"><a onclick="openContent('${c.id}')">${c.title}${c.locked?' '+lockMini():''}</a></h2>
      <div class="c-teaser__meta">${c.date}<span> — ${c.author}</span></div>
      <div class="c-teaser__body">${c.summary}</div>
    </div>
  </article>`;
}
const lockMini=()=>`<span style="color:var(--lock);vertical-align:middle">${I.lock}</span>`;
function setTab(t){HOME_TAB=t;render();}

/* ---- RUBRIQUE (liste de contenus) ---- */
function viewRubrique(id){
  const items=CONTENT.filter(c=>c.rub===id);
  return band(rubName(id),`<div class="wrap pad">
    <div class="crumb"><a onclick="go('')">Accueil</a><span class="sep">›</span><a onclick="go('rubriques')">Rubriques</a><span class="sep">›</span>${rubName(id)}</div>
    <div class="clist">${items.length?items.map(citem).join(""):"<p style='color:var(--muted)'>Aucun contenu dans cette rubrique pour cette démo.</p>"}</div>
    ${offer()}
  </div>`);
}

/* ---- CONTENU PAR TYPE ---- */
function viewContenuType(t){
  const items=CONTENT.filter(c=>c.type===t);
  return band(t,`<div class="wrap pad">
    <div class="crumb"><a onclick="go('')">Accueil</a><span class="sep">›</span>Contenu<span class="sep">›</span>${t}</div>
    <div class="clist">${items.length?items.map(citem).join(""):"<p style='color:var(--muted)'>Pas de contenu de ce type dans la démo.</p>"}</div>
    ${offer()}
  </div>`);
}

function citem(c){
  return `<div class="citem" onclick="openContent('${c.id}')">
    <div class="cthumb" style="background:linear-gradient(135deg,${tColor(c.type)},${tColor(c.type)}cc)">${tIcon(c.type)}</div>
    <div class="cbody">
      <h3>${c.title}${c.locked?' '+lockMini():''}</h3>
      <div class="ctype">${c.type}</div>
      <div class="crub">${rubName(c.rub)}</div>
      <div class="cmeta"><b>Auteur(s) :</b> ${c.author} &nbsp;·&nbsp; <b>Dernière modification :</b> ${c.date}</div>
    </div>
    <div class="cside">
      <span class="badge-num">${I.trend} ${c.trend}</span>
      <span class="badge-score">${c.score.toFixed(2)}</span>
    </div>
  </div>`;
}

function viewBiblio(){
  const books=CONTENT.filter(c=>c.type==="Livres");
  const tree=[["Collection"+TENANT.collection.replace("Connect",""),CONTENT.length,0],
    ["Aide sociale et intégration",CONTENT.filter(c=>c.rub==="aide-sociale").length,1],

    ["Fonctionnement des CPAS",CONTENT.filter(c=>c.rub==="fonctionnement").length,1]];
  return band("Bibliothèque",`<div class="wrap"><div class="s-layout">
    <aside class="s-side">
      <button class="filter-btn" style="margin-bottom:18px">Types de contenu ${I.chev}</button>

function bookCard(c){

/* ---- CHERCHER ---- */
let SF_TYPE="Tous";
function viewSearch(q){
  let res=CONTENT.map(c=>({c,s:score(c,q)})).filter(r=>r.s>0).sort((a,b)=>b.s-a.s).map(r=>r.c);
  if(!q)res=CONTENT.slice().sort((a,b)=>b.score-a.score);
  if(SF_TYPE!=="Tous")res=res.filter(c=>c.type===SF_TYPE);
  const total=q?res.length:61155;
  const ai=ASSIST.find(a=>a.match.some(m=>norm(q).includes(norm(m))));
  const types=["Tous",...new Set(CONTENT.map(c=>c.type))];
  const treeR=RUBRIQUES.map(r=>[r.name,CONTENT.filter(c=>c.rub===r.id).length]);
  return band("",`
  <div class="searchbig"><div class="wrap">
    <div class="search-input"><span class="typesel">Tout type de contenu ${I.chev}</span>${I.search}
      <input id="sInput" value="${(q||'').replace(/"/g,'&quot;')}" placeholder="Introduisez vos termes de recherche…" onkeydown="if(event.key==='Enter')runSearch(this.value)">
      <button onclick="runSearch(document.getElementById('sInput').value)">Chercher</button></div>
    <div class="filters">
      <button class="filter-btn">Types ${I.chev}</button>
      <button class="filter-btn">Licences ${I.chev}</button>
      <button class="filter-btn">Dernière mise à jour ${I.chev}</button>
    </div>
  </div></div>
  <div class="wrap"><div class="s-layout" style="padding-top:22px">
    <aside class="s-side">
      <h4>Rubriques</h4>
      <div class="tree">${treeR.map(t=>`<label class="tnode"><input type="checkbox"> ${t[0]}<span class="tc">${t[1]}</span></label>`).join("")}</div>
      <h4 style="margin-top:18px">Type de contenu</h4>
      <div class="tree">${types.map(t=>`<label class="tnode" onclick="setSType('${t}','${encodeURIComponent(q||'')}')"><input type="radio" ${SF_TYPE===t?'checked':''}> ${t}</label>`).join("")}</div>
    </aside>
    <div>
      ${ai?`<div class="amsg" style="margin-bottom:18px">
        <div class="assist-q" style="color:var(--assist2)">${I.assist} Réponse de l'assistant Assist</div>
        <div id="aiAns"><div class="thinking"><span></span><span></span><span></span></div></div>
        <div class="asrc" id="aiSrc" style="display:none">${ai.sources.map(id=>{const a=byId(id);return `<div class="s" onclick="openContent('${id}')">${a.locked?I.lock:I.doc} ${a.title}</div>`;}).join("")}</div>
      </div>`:""}
      <div class="s-head"><span class="rc">${total.toLocaleString('fr-BE')} résultat${total>1?'s':''}${q?` pour « <b>${q}</b> »`:''}</span>
        <span class="sort">Trier par <b>les plus pertinents d'abord</b> ${I.chev}</span></div>
      <div class="clist">${res.length?res.map(c=>resultItem(c,q)).join(""):"<p style='color:var(--muted)'>Aucun résultat. Essayez « RIS », « enquête sociale » ou « médiation de dettes ».</p>"}</div>
    </div>
  </div></div>
  ${ai?`<script>setTimeout(function(){var e=document.getElementById('aiAns');if(e){e.innerHTML='<div class="answer">'+${JSON.stringify(ai.text)}+'</div>';var s=document.getElementById('aiSrc');if(s)s.style.display='flex';}},650)<\/script>`:""}`,true);
}
function resultItem(c,q){
  return `<div class="citem" onclick="openContent('${c.id}')">
    <div class="cthumb" style="background:linear-gradient(135deg,${tColor(c.type)},${tColor(c.type)}cc)">${tIcon(c.type)}</div>
    <div class="cbody">
      <h3>${hl(c.title,q)}${c.locked?' '+lockMini():''}</h3>
      <div class="ctype">${c.type}</div><div class="crub">${rubName(c.rub)}</div>
      <div class="cmeta"><b>Auteur(s) :</b> ${c.author} &nbsp;·&nbsp; <b>Dernière modification :</b> ${c.date}</div>
    </div>
    <div class="cside"><span class="badge-num">${I.trend} ${c.trend}</span><span class="badge-score">${c.score.toFixed(2)}</span></div>
  </div>`;
}
function score(c,q){const tk=norm(q).split(/\s+/).filter(Boolean);if(!tk.length)return 0;
  const hay=norm(c.title+" "+c.summary+" "+c.tags.join(" ")+" "+c.type+" "+rubName(c.rub));
  let s=0;tk.forEach(t=>{if(hay.includes(t))s+=norm(c.title).includes(t)?3:1});return s;}
function hl(text,q){const tk=[...new Set(norm(q||"").split(/\s+/).filter(t=>t.length>2))];let o=text;
  tk.forEach(t=>{o=o.replace(new RegExp("("+t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>")});return o;}
function setSType(t,q){SF_TYPE=t;go("chercher?q="+q);}

function viewArticle(id){
  const c=byId(id);if(!c)return viewHome();
  if(c.locked){setTimeout(()=>openLock(c.title),50);return viewRubrique(c.rub);}
  const rel=(c.related||[]).map(byId).filter(Boolean);
  const clr=tColor(c.type);
  const safeTitle=c.title.replace(/'/g,"\\'");
  const typeItems=CONTENT.filter(x=>x.type===c.type);
  const idx=typeItems.findIndex(x=>x.id===c.id);
  const prev=idx>0?typeItems[idx-1]:null;
  const next=idx<typeItems.length-1?typeItems[idx+1]:null;
  // Couverture visuelle (Highlights, Magazines, Livres)
  let cover="";
  if(["Highlights","Magazines"].includes(c.type)){
    cover=`<div class="art-cover" style="background:${clr}13;border:1.5px solid ${clr}30">
      <div class="ac-badge" style="background:${clr};color:#fff">${tIcon(c.type)}<span>${c.type.toUpperCase()}</span></div>
      <div class="ac-body">
        <div class="ac-title-cover" style="color:${clr}">${c.title}</div>
        <div class="ac-rub">${rubName(c.rub)}</div>
      </div>
    </div>`;
  }else if(c.type==="Livres"){
    const cv=c.cover||{lic:TENANT.collection,icon:"📄"};
    cover=`<div class="art-cover" style="background:var(--navy)">
      <div class="ac-badge" style="background:rgba(0,0,0,.25);color:rgba(255,255,255,.85)">${cv.lic}</div>

        <div class="ac-title-cover" style="color:#fff">${c.title}</div>
      </div>
    </div>`;
  }
  // Corps avec titres de section (## Titre)
  const bodyHtml=c.body.map(p=>{
    if(p.startsWith("## "))return`<h2 class="body-h2" style="color:${clr}">${p.slice(3)}</h2>`;
    if(p.startsWith("### "))return`<h3 class="body-h3">${p.slice(4)}</h3>`;
    return`<p>${p}</p>`;
  }).join("");
  return `<div class="art-layout">
    ${iconRail()}
    <aside class="art-side-left">
      <div class="asl-head" style="color:${clr}">${tIcon(c.type)}<span>${c.type}</span></div>
      <div class="asl-search"><input placeholder="Chercher"><button>${I.search}</button></div>
      <div class="asl-nav">
        ${prev?`<a class="asl-nav-a" onclick="openContent('${prev.id}')">← Résultat précédent</a>`:`<span class="asl-nav-a disabled">← Résultat précédent</span>`}
        ${next?`<a class="asl-nav-a" onclick="openContent('${next.id}')">Résultat suivant →</a>`:`<span class="asl-nav-a disabled">Résultat suivant →</span>`}
      </div>
      <div class="asl-list">
        ${typeItems.map(x=>`<div class="asl-item${x.id===c.id?" active":""}" ${x.id!==c.id?`onclick="openContent('${x.id}')"`:""}>
          ${x.locked?`<span class="asl-lock">${I.lock}</span>`:""}
          <span>${x.title}</span>
        </div>`).join("")}
      </div>
    </aside>
    <div class="art-main">
      <div class="art-inner">
        <div class="art-top-bar">
          <div class="crumb"><a onclick="go('')">Accueil</a><span class="sep">›</span><a onclick="go('rubrique/${c.rub}')">${rubName(c.rub)}</a><span class="sep">›</span>${c.type}</div>
          <div class="art-icon-btns">
            <button class="art-icon-btn" onclick="window.print()" title="Imprimer">${I.doc}</button>
            <button class="art-icon-btn locked" onclick="openLock('${safeTitle}')" title="Télécharger">${I.doc}</button>
            <button class="art-icon-btn locked" onclick="openLock('${safeTitle}')" title="Mémo / Favori">${I.star}</button>
          </div>
        </div>
        <h1>${c.title}</h1>
        <div class="ameta-v">
          <div><b>Auteur(s) :</b> ${c.author}</div>
          <div><b>Date de publication :</b> ${c.date}</div>
          ${c.tags.length?`<div class="tag-row">${c.tags.slice(0,5).map(t=>`<span class="tag">${t}</span>`).join("")}</div>`:""}
        </div>
        <div class="art-sep"></div>
        <div class="body">${cover}${bodyHtml}<div style="clear:both"></div></div>
        ${rel.length?`<div class="related"><h4>${I.brain} Les agents consultent aussi</h4>
          ${rel.map(r=>`<div class="ri" onclick="openContent('${r.id}')"><span class="rii">${r.locked?I.lock:I.doc}</span>
            <div><h5>${r.title}</h5><small>${r.type} · ${rubName(r.rub)}</small></div></div>`).join("")}</div>`:""}
        ${offer()}
      </div>
    </div>
  </div>`;
}

    const nomCommune=op.commune?op.commune.nom:op.cp;
    return `<div class="offer offer-ready">
    <div>
      <h2>Votre offre personnalisée est prête</h2>
      <p>Document préparé spécialement pour <strong>${nomCommune}</strong>. Cliquez ci-dessous pour le télécharger via SharePoint.</p>
    </div>
    <div class="oc">
      <button class="btn btn-w" onclick="downloadOffer()">⬇ Télécharger mon offre</button>
      <button class="btn btn-o" onclick="ext()">Demander une démo</button>
    </div></div>`;
  }
  return `<div class="offer">
  <div><h2>${TENANT.offer.title}</h2><p>${TENANT.offer.pitch}</p><div class="price">${TENANT.offer.price}</div></div>
  <div class="oc">
    <button class="btn btn-w" onclick="downloadOffer()">Télécharger mon offre</button>
    <button class="btn btn-o" onclick="ext()">Demander une démo</button>
  </div></div>`;
}
function ext(){window.open(TENANT.contactUrl,'_blank');}

/* ---- Téléchargement de l'offre personnalisée ---- */
function downloadOffer(){
  if(OFFER_PARAMS&&OFFER_PARAMS.url){window.open(OFFER_PARAMS.url,'_blank');return;}
  const o=TENANT.offer;
  if(!o.requireCode){window.open(o.documentUrl,'_blank');return;}
  openOfferModal();
}
function openOfferModal(){
  closeOffer();const o=TENANT.offer;
  const el=document.createElement("div");el.className="modal-bg";el.id="offerModal";
  el.onclick=e=>{if(e.target===el)closeOffer();};
  el.innerHTML=`<div class="modal"><button class="mclose" onclick="closeOffer()">×</button>
    <div class="mt" style="background:var(--pill);border-color:#d7e6f6">
      <span class="lp" style="background:var(--blue)">${I.lock} Offre personnalisée</span>
      <h3>Télécharger l'offre de ${TENANT.commune}</h3></div>
    <div class="mb">
      <p>Saisissez le code reçu par e-mail avec votre proposition. Il ouvre votre document personnalisé.</p>
      <input id="offerCode" placeholder="Votre code" autocomplete="off" style="width:100%;border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;font-size:15px;outline:none" onkeydown="if(event.key==='Enter')submitOfferCode()">
      <div style="font-size:12.5px;color:var(--muted);margin:8px 0 16px">${o.codeHint||""}</div>
      <div id="offerStatus" style="display:none;font-size:13.5px;border-radius:9px;padding:11px 13px;margin-bottom:14px"></div>
      <div class="macts">
        <button class="btn btn-b" onclick="submitOfferCode()">Ouvrir mon offre</button>
        <button class="btn btn-g" onclick="closeOffer()">Annuler</button></div></div></div>`;
  document.body.appendChild(el);
  setTimeout(()=>{const i=document.getElementById("offerCode");if(i)i.focus();},50);
}
function closeOffer(){const m=document.getElementById("offerModal");if(m)m.remove();}
function offerStatus(kind,msg){
  const s=document.getElementById("offerStatus");if(!s)return;
  const col=kind==="ok"?["#e4f5ec","#1f7a4d"]:kind==="err"?["#fbe6e4","#b4453a"]:["#fff7e6","#9a6b1a"];
  s.style.display="block";s.style.background=col[0];s.style.color=col[1];s.textContent=msg;
}
function submitOfferCode(){
  const raw=(document.getElementById("offerCode")||{}).value||"";
  const c=raw.trim().toLowerCase().replace(/[^a-z0-9_-]/g,"");      // code = jeton simple
  if(!c){offerStatus("err","Veuillez saisir votre code.");return;}
  const url=TENANT.offer.codeUrlPattern.replace("{code}",encodeURIComponent(c));
  offerStatus("info","Vérification…");
  // Même origine (asset statique) : on vérifie l'existence. Cross-origin (SharePoint) :
  // la vérification échoue (CORS) -> on ouvre directement, c'est SharePoint qui gère l'accès.
  fetch(url,{method:"HEAD"}).then(r=>{
    if(r.ok){window.open(url,"_blank");offerStatus("ok","Votre offre s'ouvre dans un nouvel onglet.");}
    else{offerStatus("info","Aucune offre n'est déposée pour ce code dans cette démonstration. En production, le code ouvrirait : "+url);}
  }).catch(()=>{window.open(url,"_blank");offerStatus("ok","Ouverture de votre offre personnalisée…");});
}

/* ---- LOCK MODAL ---- */
function openLock(title){
  const bens=[["bulb","Restez informé"],["runner","Travaillez plus efficacement"],["stop","Gagnez du temps"],["brain","Renforcez vos connaissances"]];
  const el=document.createElement("div");el.className="modal-bg";el.id="lockModal";
  el.onclick=e=>{if(e.target===el)closeLock();};
  el.innerHTML=`<div class="modal"><button class="mclose" onclick="closeLock()">×</button>
    <div class="mt"><span class="lp">${I.lock} Réservé à la version complète</span>
      <h3>${title||"Ce contenu est réservé aux abonnés de "+TENANT.collection}</h3></div>
    <div class="mb"><p>Cette fonctionnalité fait partie de la licence complète de ${TENANT.collection}. Voici ce que vos agents y gagnent :</p>
      <div class="bens">${bens.map(b=>`<div class="ben"><span class="bi">${I[b[0]]}</span><span>${b[1]}</span></div>`).join("")}</div>
      <div class="macts"><button class="btn btn-b" onclick="ext()">Demander l'accès complet</button>
      <button class="btn btn-g" onclick="closeLock()">Continuer la démo</button></div></div></div>`;
  document.body.appendChild(el);
}
function closeLock(){const m=document.getElementById("lockModal");if(m)m.remove();}

/* ---- ASSIST PANEL (IA) ---- */
function openAssist(preset){
  closeAssist();
  const bg=document.createElement("div");bg.className="assist-bg";bg.id="assistBg";bg.onclick=closeAssist;
  const p=document.createElement("div");p.className="assist-panel";p.id="assistPanel";
  p.innerHTML=`<div class="assist-head"><div class="ah">${I.assist} Assist</div>
    <p>Posez votre question en langage courant. Je cherche dans ${TENANT.collection} et je résume.</p></div>
    <div class="assist-body" id="assistBody">
      <div class="assist-q">Questions fréquentes</div>
      ${["Quelles sont les conditions du RIS ?","Comment mener une enquête sociale ?","Quelles voies pour la médiation de dettes ?","Quel est l'impact de la réforme du chômage ?"]
        .map(q=>`<button class="aq" onclick="askAssist('${q.replace(/'/g,"\\'")}')">${q}</button>`).join("")}
    </div>
    <div class="assist-foot"><input id="assistInput" placeholder="Votre question…" onkeydown="if(event.key==='Enter')askAssist(this.value)">
      <button onclick="askAssist(document.getElementById('assistInput').value)">${I.search}</button></div>`;
  document.body.appendChild(bg);document.body.appendChild(p);
  if(preset)askAssist(preset);
}
function closeAssist(){["assistBg","assistPanel"].forEach(i=>{const e=document.getElementById(i);if(e)e.remove();});}
function askAssist(q){
  if(!q||!q.trim())return;
  const body=document.getElementById("assistBody");if(!body)return;
  const ai=ASSIST.find(a=>a.match.some(m=>norm(q).includes(norm(m))));
  const block=document.createElement("div");
  block.innerHTML=`<div style="font-size:13.5px;font-weight:600;color:var(--navy);margin:14px 0 4px">« ${q} »</div>
    <div class="amsg"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  body.appendChild(block);body.scrollTop=body.scrollHeight;
  setTimeout(()=>{
    const m=block.querySelector(".amsg");
    if(ai){m.innerHTML=`<div class="answer">${ai.text}</div>
      <div class="asrc">${ai.sources.map(id=>{const a=byId(id);return `<div class="s" onclick="closeAssist();openContent('${id}')">${a.locked?I.lock:I.doc} ${a.title}</div>`;}).join("")}</div>`;}
    else{m.innerHTML=`<div class="answer">Je n'ai pas de réponse pré-indexée pour cette question dans la démo. Dans la version complète, Assist interroge l'ensemble des contenus. Essayez « RIS », « enquête sociale » ou « réforme du chômage ».</div>`;}
    body.scrollTop=body.scrollHeight;
  },700);
  const inp=document.getElementById("assistInput");if(inp)inp.value="";
}

/* ============================================================
   SHELL + ROUTER
   ============================================================ */
function band(title,inner,noBand){
  return (title?`<div class="band"><div class="wrap"><h1>${title}</h1></div></div>`:"")+inner;
}
function shell(content){
  const path=(location.hash.replace("#/","")||"").split("?")[0];
  const isHome=path===""||path==="accueil";
  const types=Object.keys(TYPES);
  const navItem=(p,ic,lbl,act)=>`<a onclick="go('${p}')" class="${act?'active':''}">${ic}<span class="lbl">${lbl}</span></a>`;
  return `<header class="main"><div class="wrap">
    <a class="logo" onclick="go('')">${CUBE}</a>
    <span class="demo-pill">Démo</span>
    <nav class="top">
      ${navItem('',I.home,'',isHome)}
      ${navItem('chercher',I.search,'Chercher',path.startsWith('chercher'))}
      ${navItem('bibliotheque',I.book,'Bibliothèque',path.startsWith('biblioth'))}
      ${navItem('rubriques',I.grid,'Rubriques',path.startsWith('rubri'))}
      <div class="contenu-wrap">
        <a onclick="toggleContenu(event)" class="${path.startsWith('contenu')?'active':''}">${I.folder}<span class="lbl">Contenu</span> ${I.chev}</a>
        <div class="dropdown" id="contenuDD" style="display:none">
          ${types.map(t=>`<a onclick="go('contenu/${encodeURIComponent(t)}')">${tIcon(t)} ${t}</a>`).join("")}
        </div>
      </div>
    </nav>
    <div class="head-right">
      <button class="assist-btn" onclick="openAssist()">${I.assist} Assist</button>
      <span class="lang">FR</span>
      <button class="head-icon" title="Aide">${I.help}</button>
      <button class="head-icon" title="${TENANT.commune}">${I.user}</button>
    </div>
  </div></header>
  <main>${content}</main>
  <footer><div class="wrap">
    <span>Vanden Broele</span><span>–</span><span>Disclaimer</span><span>–</span><span>Conditions</span><span>–</span>
    <span>Vie privée</span><span>–</span><span>IA Disclaimer</span><span>–</span><span>Déclaration d'accessibilité</span>
    <span style="width:100%;margin-top:8px;color:#9aa6b2">Démonstration · contenus simulés · ${TENANT.commune} — « Innover par la connaissance »</span>
  </div></footer>
  <button class="tour-launch" onclick="startTour()" title="Visite guidée de la démo">${I.assist}<span>Visite guidée</span></button>
  ${OFFER_PARAMS?`<button class="offer-fab" onclick="downloadOffer()">${I.doc}<span>Mon offre</span></button>`:""}` ;
}
function toggleContenu(e){e.stopPropagation();const d=document.getElementById("contenuDD");if(d)d.style.display=d.style.display==="none"?"block":"none";}
document.addEventListener("click",()=>{const d=document.getElementById("contenuDD");if(d)d.style.display="none";});

function go(p){location.hash="#/"+p;window.scrollTo(0,0);}
function runSearch(q){if(q&&q.trim()){SF_TYPE="Tous";go("chercher?q="+encodeURIComponent(q.trim()));}else{go("chercher");}}

/* ---- PAGE ADMIN : générateur de liens démo ---- */
function viewAdmin(){
  const cols=(TENANT.collections||["CPAS","DG","FINANCES","RH","TECHNIQUE","URBANISME"]);
  const ghUpload='https://github.com/suyttenhoef-cyber/demo-connect/upload/master/offres';
  return `<div class="admin-page">
  <div class="admin-banner">
    <div class="wrap"><h1>Générateur de lien démo</h1>
    <p>Préparez le PDF, déposez-le sur GitHub, générez le lien prospect. Aucune modification de code.</p></div>
  </div>
  <div class="wrap pad">
    <div class="admin-card">

      <div class="admin-steps">
        <div class="admin-step"><span class="admin-step-n">1</span><div>
          <strong>Générez le nom de fichier</strong>
          <span>Remplissez les champs ci-dessous et cliquez sur <em>Générer</em> pour obtenir le nom exact à utiliser.</span>
        </div></div>
        <div class="admin-step"><span class="admin-step-n">2</span><div>
          <strong>Déposez le PDF sur GitHub</strong>
          <span>Renommez votre PDF selon le nom généré, puis déposez-le via le bouton ci-dessous (glisser-déposer dans GitHub).</span>
        </div></div>
        <div class="admin-step"><span class="admin-step-n">3</span><div>
          <strong>Envoyez le lien démo au prospect</strong>
          <span>Copiez le lien généré et transmettez-le. Le prospect cliquera sur « Mon offre » pour télécharger son document.</span>
        </div></div>
      </div>

      <div class="admin-form">
        <div class="admin-row2">
          <div class="admin-row">
            <label for="adminCp">Commune / Code postal</label>
            <input id="adminCp" list="adminCpList" placeholder="Ex. : 5060 ou Sambreville" autocomplete="off">
            <datalist id="adminCpList">
              ${(typeof COMMUNES!=='undefined'?COMMUNES:[]).map(c=>`<option value="${c.cp}">${c.cp} — ${c.nom}</option>`).join("")}
            </datalist>
          </div>
          <div class="admin-row">
            <label for="adminCol">Collection</label>
            <select id="adminCol">
              ${cols.map(c=>`<option value="${c}"${c==="CPAS"?" selected":""}>${c}</option>`).join("")}
            </select>
          </div>
        </div>
        <button class="btn btn-b admin-gen-btn" onclick="adminGenerate()">Générer</button>
      </div>

      <div id="adminResult" class="admin-result" style="display:none">
        <div class="admin-res-row">
          <label>1 — Nom exact du fichier PDF</label>
          <div class="admin-copy-wrap">
            <input id="adminFileName" class="admin-copy-input" readonly>
            <button class="admin-copy-btn" onclick="adminCopy('adminFileName',this)">Copier</button>
          </div>
        </div>
        <div class="admin-res-row">
          <label>2 — Déposer le PDF sur GitHub (glisser-déposer)</label>
          <a id="adminGhLink" class="btn btn-b" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-size:13.5px;padding:9px 18px" href="${ghUpload}" target="_blank">
            ${I.doc} Ouvrir le dépôt GitHub → dossier offres/
          </a>
        </div>
        <div class="admin-res-row">
          <label>3 — Lien démo à envoyer au prospect</label>
          <div class="admin-copy-wrap">
            <input id="adminDemoUrl" class="admin-copy-input" readonly>
            <button class="admin-copy-btn" onclick="adminCopy('adminDemoUrl',this)">Copier</button>
          </div>
        </div>
        <div class="admin-note">
          ${I.bulb} Après avoir déposé le PDF sur GitHub, attendez environ 1 minute que le site se mette à jour avant d'envoyer le lien au prospect.
        </div>
      </div>

    </div>
  </div></div>`;
}

function adminGenerate(){
  const raw=(document.getElementById('adminCp')||{}).value||"";
  const col=(document.getElementById('adminCol')||{}).value||"CPAS";
  const cpNum=raw.replace(/\D/g,"").slice(0,4);
  if(!cpNum){alert('Veuillez saisir un code postal à 4 chiffres.');return;}
  const commune=(typeof COMMUNES!=='undefined'?COMMUNES:[]).find(c=>c.cp===cpNum);
  const fileName=col+'-'+cpNum+'.pdf';
  const demoUrl=location.origin+location.pathname+'?c='+cpNum+'&col='+encodeURIComponent(col);
  document.getElementById('adminFileName').value=fileName;
  document.getElementById('adminDemoUrl').value=demoUrl;
  document.getElementById('adminResult').style.display='block';
  if(commune)document.getElementById('adminCp').value=cpNum+' — '+commune.nom;
}

function adminCopy(id,btn){
  const el=document.getElementById(id);if(!el)return;
  el.select();
  navigator.clipboard.writeText(el.value).then(()=>{
    const orig=btn.textContent;btn.textContent='✓ Copié';btn.style.background='#1f7a4d';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';},2000);
  }).catch(()=>{document.execCommand('copy');});
}

function render(){
  const h=(location.hash.replace("#/","")||"");
  const [path,query]=h.split("?");
  let c;
  if(path===""||path==="accueil")c=viewHome();
  else if(path==="admin")c=viewAdmin();
  else if(path==="rubriques")c=viewRubriques();
  else if(path.startsWith("rubrique/"))c=viewRubrique(path.split("/")[1]);
  else if(path.startsWith("biblioth"))c=viewBiblio();
  else if(path.startsWith("chercher")){const q=decodeURIComponent((query||"").replace(/^q=/,""));c=viewSearch(q);}
  else if(path.startsWith("contenu-detail/"))c=viewArticle(path.split("/")[1]);
  else if(path.startsWith("contenu/"))c=viewContenuType(decodeURIComponent(path.split("/")[1]));
  else c=viewHome();
  document.getElementById("app").innerHTML=shell(c);
  document.querySelectorAll("#app script").forEach(s=>{const n=document.createElement("script");n.textContent=s.textContent;s.replaceWith(n);});
}
window.addEventListener("hashchange",render);

/* ---- VISITE GUIDÉE ---- */
const TOUR=[
 {h:"Bienvenue sur la démo Connect",p:"Vous explorez une version de démonstration de la plateforme. L'interface reproduit le vrai produit ; les contenus sont simulés. Suivons un parcours type.",act:()=>go("")},
 {h:"1 · La recherche, point d'entrée",p:"Tapez une question en langage courant et obtenez les bons contenus, classés par pertinence.",act:()=>runSearch("conditions du RIS")},
 {h:"2 · Assist, l'assistant intégré",p:"Le bouton violet « Assist » répond directement à vos questions et renvoie vers les sources.",act:()=>{closeLock();openAssist("Quelles sont les conditions du RIS ?");}},
 {h:"3 · Naviguer par rubrique",p:"Les Rubriques organisent toute la connaissance métier de la collection.",act:()=>{closeAssist();go("rubriques");}},
 {h:"4 · Les contenus premium",p:"Modèles, dossiers et livres marqués d'un cadenas sont réservés à la version complète.",act:()=>openLock("Trame type de rapport d'enquête sociale")},
 {h:"5 · Passer à la version complète",p:"Un appel à l'action clair guide la commune vers l'offre. Fin de la visite — explorez librement !",act:()=>{closeLock();go("");}},
];
let tStep=0;
function startTour(){tStep=0;closeLock();closeAssist();showTour();}
function showTour(){const o=document.getElementById("tour");if(o)o.remove();if(tStep>=TOUR.length)return;
  const t=TOUR[tStep];t.act&&t.act();
  setTimeout(()=>{const el=document.createElement("div");el.className="tour";el.id="tour";
    el.innerHTML=`<div class="ts">Visite guidée · ${tStep+1}/${TOUR.length}</div><h4>${t.h}</h4><p>${t.p}</p>
      <div class="ta"><button class="skip" onclick="endTour()">Quitter</button>
      <button class="next" onclick="nextTour()">${tStep<TOUR.length-1?"Suivant →":"Terminer"}</button></div>`;
    document.body.appendChild(el);},140);}
function nextTour(){tStep++;if(tStep>=TOUR.length){endTour();return;}showTour();}
function endTour(){const e=document.getElementById("tour");if(e)e.remove();}

/* init */
render();

</script>
